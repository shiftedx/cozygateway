name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # build first: workspace packages resolve cozygateway-contract through its
      # exports map, which points at dist/, so a fresh checkout needs the build
      # before typecheck or test can resolve the package
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter cozygateway-contract lint:package

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      # ws (used by the smoke driver) resolves from the gateway package after install
      - run: pnpm install --frozen-lockfile
      - run: bash scripts/docker-smoke.sh
